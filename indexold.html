<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#14181D">
<title>Recomp Tracker</title>
<style>
  :root{
    --bg:#14181D;--card:#1D232B;--card2:#242B35;--line:#2E3743;
    --text:#E8EDF2;--dim:#8A96A3;--accent:#35C4B5;--amber:#E8A33D;--red:#E0645C;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;padding-bottom:92px}
  .cond{font-family:"Barlow Semi Condensed","Arial Narrow",system-ui,sans-serif}
  header{display:flex;justify-content:space-between;align-items:baseline;padding:16px 16px 6px}
  .logo{font-weight:800;font-size:22px;letter-spacing:.5px}
  .logo b{color:var(--accent)}
  #savemsg{font-size:12px;min-width:70px;text-align:right;color:var(--accent)}
  #savemsg.err{color:var(--red)}
  .datenav{display:flex;align-items:center;gap:8px;padding:0 16px 10px}
  .datenav button.arrow{background:var(--card);border:1px solid var(--line);color:var(--text);
    width:44px;height:44px;border-radius:12px;font-size:20px;cursor:pointer;flex:none}
  .datenav .dwrap{flex:1;position:relative}
  .datenav .dlabel{background:var(--card);border:1px solid var(--line);border-radius:12px;
    height:44px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;gap:8px}
  .datenav .dlabel .tag{font-size:11px;color:var(--accent);font-weight:700}
  .datenav input[type=date]{position:absolute;inset:0;opacity:0;width:100%;height:100%;border:none}
  .datenav button.today{background:var(--accent);color:#0E1114;border:none;height:44px;padding:0 14px;
    border-radius:12px;font-weight:700;font-size:13px;cursor:pointer;flex:none}
  .stats{display:flex;gap:8px;padding:0 16px 12px}
  .stat{flex:1;background:var(--card);border-radius:12px;padding:10px 6px;text-align:center}
  .stat .v{font-weight:800;font-size:19px;color:var(--accent)}
  .stat .v small{font-size:11px;color:var(--dim);font-weight:600}
  .stat .l{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--dim);margin-top:2px}
  main{padding:0 16px}
  .card{background:var(--card);border-radius:14px;padding:16px;margin-bottom:12px}
  label.fl{font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--dim);
    margin-bottom:6px;display:block;font-weight:600}
  input[type=number],input[type=text],select{background:var(--card2);border:1px solid var(--line);border-radius:10px;
    color:var(--text);padding:12px;font-size:18px;width:100%;font-weight:600;outline:none;
    font-family:"Barlow Semi Condensed","Arial Narrow",system-ui,sans-serif}
  input:focus,select:focus{border-color:var(--accent)}
  .row{display:flex;gap:10px}.row>div{flex:1}
  .toggle{display:flex;gap:8px}
  .toggle button{flex:1;padding:13px 0;border-radius:10px;font-size:15px;font-weight:700;
    cursor:pointer;background:var(--card2);color:var(--dim);border:1px solid var(--line)}
  .toggle button.on-yes{background:var(--accent);color:#0E1114;border-color:var(--accent)}
  .toggle button.on-no{background:var(--red);color:#0E1114;border-color:var(--red)}
  .knee{display:flex;gap:4px}
  .knee button{flex:1;padding:10px 0;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;
    background:var(--card2);color:var(--dim);border:1px solid var(--line)}
  .knee button.sel-low{background:var(--accent);color:#0E1114;border-color:transparent}
  .knee button.sel-mid{background:var(--amber);color:#0E1114;border-color:transparent}
  .knee button.sel-high{background:var(--red);color:#0E1114;border-color:transparent}
  .daypick{display:flex;gap:8px;margin-bottom:14px}
  .daypick button{flex:1;padding:14px 0;border-radius:12px;font-weight:800;font-size:17px;cursor:pointer;
    background:var(--card);color:var(--dim);border:1px solid var(--line)}
  .daypick button.sel{background:var(--accent);color:#0E1114;border-color:var(--accent)}
  .exhead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;gap:8px}
  .exname{font-weight:700;font-size:15px}
  .extgt{font-size:12px;color:var(--dim);white-space:nowrap}
  .prev{font-size:12px;color:var(--amber);margin-top:8px}
  .prev.none{color:var(--dim)}
  .hint{font-size:12px;color:var(--dim);margin-bottom:12px;line-height:1.5}
  .delx{background:none;border:none;color:var(--dim);font-size:12px;cursor:pointer;text-decoration:underline;padding:0;margin-top:8px}
  nav{position:fixed;bottom:0;left:0;right:0;display:flex;background:var(--card);
    border-top:1px solid var(--line);padding:6px 0 max(14px,env(safe-area-inset-bottom))}
  nav button{flex:1;background:none;border:none;border-top:2px solid transparent;cursor:pointer;
    color:var(--dim);font-weight:700;font-size:13px;padding:10px 0}
  nav button.sel{color:var(--accent);border-top-color:var(--accent)}
  .waistrow,.histrow{display:flex;justify-content:space-between;padding:10px 0;
    border-bottom:1px solid var(--line);font-size:15px;cursor:pointer}
  .waistrow .d,.histrow .d{color:var(--dim)}
  .delta-dn{color:var(--accent);font-size:13px}.delta-up{color:var(--red);font-size:13px}
  .btn{width:100%;padding:14px 0;border-radius:12px;font-weight:700;font-size:15px;cursor:pointer;
    background:var(--card2);color:var(--text);border:1px solid var(--line);margin-top:8px}
  .btn.primary{background:var(--accent);color:#0E1114;border-color:var(--accent)}
  .empty{color:var(--dim);font-size:13px;padding:8px 0;line-height:1.5}
  .waistflag{border:1px solid var(--amber)}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;padding:20px;z-index:50}
  .modal .box{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;width:100%;max-width:420px}
  .seg{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
  .seg button{flex:1;min-width:70px;padding:11px 0;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;
    background:var(--card2);color:var(--dim);border:1px solid var(--line)}
  .seg button.sel{background:var(--accent);color:#0E1114;border-color:var(--accent)}
  .histbadge{font-size:12px;color:var(--dim);margin-left:8px}
</style>
</head>
<body>
<header>
  <div class="logo cond">RECOMP<b>.</b></div>
  <div id="savemsg"></div>
</header>

<div class="datenav">
  <button class="arrow" onclick="shiftDate(-1)">&#8249;</button>
  <div class="dwrap">
    <div class="dlabel"><span id="dlabeltext">&mdash;</span><span class="tag" id="dtag"></span></div>
    <input type="date" id="datepick" onchange="pickDate(this.value)">
  </div>
  <button class="arrow" onclick="shiftDate(1)">&#8250;</button>
  <button class="today" onclick="goToday()">Today</button>
</div>

<div class="stats" id="stats"></div>
<main id="main"></main>
<div id="modalhost"></div>

<nav>
  <button id="nav-today" onclick="setTab('today')">Daily</button>
  <button id="nav-lift" onclick="setTab('lift')">Lift</button>
  <button id="nav-progress" onclick="setTab('progress')">Progress</button>
  <button id="nav-history" onclick="setTab('history')">History</button>
  <button id="nav-data" onclick="setTab('data')">Data</button>
</nav>

<input type="file" id="importfile" accept=".json" style="display:none">

<script>
"use strict";
var PROTEIN_TARGET=160;
var BUILTIN={
  A:[
    {id:"rdl",name:"Romanian Deadlift",target:"3\u00d76\u20138",m:"wr"},
    {id:"chest",name:"Chest Press",target:"3\u00d78\u201310",m:"wr"},
    {id:"lat",name:"Lat Pulldown",target:"3\u00d78\u201310",m:"wr"},
    {id:"curl",name:"Lying Leg Curl",target:"3\u00d710\u201312",m:"wr"},
    {id:"ohp",name:"DB Shoulder Press",target:"2\u00d710\u201312",m:"wr"},
    {id:"plank",name:"Plank",target:"3\u00d730\u201345s",m:"secs"}
  ],
  B:[
    {id:"squat",name:"Goblet Squat / Leg Press",target:"3\u00d78\u201310",m:"wr"},
    {id:"row",name:"1-Arm DB Row",target:"3\u00d78\u201310 /side",m:"wr"},
    {id:"incline",name:"Incline DB Press",target:"3\u00d78\u201310",m:"wr"},
    {id:"bss",name:"Bulgarian Split Squat",target:"2\u00d78 /leg",m:"wr"},
    {id:"face",name:"Face Pulls",target:"2\u00d715",m:"wr"},
    {id:"pallof",name:"Pallof Press",target:"3\u00d710 /side",m:"wr"}
  ],
  C:[
    {id:"trap",name:"Trap-Bar DL / KB Swing",target:"3\u00d75 / 3\u00d712",m:"wr"},
    {id:"chin",name:"Chin-ups / Cable Row",target:"3\u00d78\u201310",m:"wr"},
    {id:"push",name:"Push-ups / Dips",target:"3\u00d7AMRAP",m:"reps"},
    {id:"step",name:"Step-ups",target:"2\u00d710 /leg",m:"wr"},
    {id:"calf",name:"Calf Raises",target:"3\u00d715",m:"wr"},
    {id:"carry",name:"Farmer's Carry",target:"3 sets",m:"wsecs"}
  ],
  Custom:[]
};
var MLABEL={wr:"Weight \u00d7 Reps",reps:"Reps only",secs:"Seconds",wsecs:"Weight \u00d7 Seconds"};

var STORE_KEY="recomp-tracker-v2";
var DB={daily:{},lifts:{},waist:{},custom:[],hidden:[]};
function loadDB(){
  try{
    var raw=localStorage.getItem(STORE_KEY);
    if(raw){var p=JSON.parse(raw);DB.daily=p.daily||{};DB.lifts=p.lifts||{};DB.waist=p.waist||{};DB.custom=p.custom||[];DB.hidden=p.hidden||[];}
    else{var old=localStorage.getItem("recomp-tracker-v1");
      if(old){var o=JSON.parse(old);DB.daily=o.daily||{};DB.lifts=o.lifts||{};DB.waist=o.waist||{};}}
  }catch(e){}
}
var saveTimer=null;
function saveDB(){
  var msg=document.getElementById("savemsg");
  try{localStorage.setItem(STORE_KEY,JSON.stringify(DB));msg.textContent="\u2713 saved";msg.classList.remove("err");}
  catch(e){msg.textContent="save failed";msg.classList.add("err");}
  clearTimeout(saveTimer);saveTimer=setTimeout(function(){msg.textContent="";},1500);
}

function keyOf(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function todayKey(){return keyOf(new Date());}
var SEL=todayKey();
function selDateObj(){var p=SEL.split("-");return new Date(+p[0],+p[1]-1,+p[2]);}
function shortDate(k){var p=k.split("-");return p[1]+"/"+p[2];}
function longLabel(k){
  var p=k.split("-"),d=new Date(+p[0],+p[1]-1,+p[2]);
  var wd=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getDay()];
  var mo=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][d.getMonth()];
  return wd+", "+mo+" "+d.getDate();
}
function shiftDate(n){var d=selDateObj();d.setDate(d.getDate()+n);SEL=keyOf(d);render();}
function pickDate(v){if(v){SEL=v;render();}}
function goToday(){SEL=todayKey();render();}

function esc(s){return String(s).replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}
function numOrNull(v){if(v===""||v==null)return null;var n=Number(v);return isNaN(n)?null:n;}
function allExercises(){
  var g={A:[],B:[],C:[],Custom:[]};
  ["A","B","C","Custom"].forEach(function(dy){BUILTIN[dy].forEach(function(e){if(DB.hidden.indexOf(e.id)<0)g[dy].push(e);});});
  DB.custom.forEach(function(e){if(DB.hidden.indexOf(e.id)<0&&g[e.day])g[e.day].push(e);});
  return g;
}
function exMeta(id){
  var found=null;
  ["A","B","C","Custom"].forEach(function(dy){BUILTIN[dy].forEach(function(e){if(e.id===id)found=e;});});
  DB.custom.forEach(function(e){if(e.id===id)found=e;});
  return found;
}

function weightSeries(){
  var keys=Object.keys(DB.daily).sort().filter(function(k){return DB.daily[k]&&DB.daily[k].w!=null;});
  return keys.map(function(k,i){
    var win=keys.slice(Math.max(0,i-6),i+1),sum=0;win.forEach(function(x){sum+=DB.daily[x].w;});
    return {k:k,date:shortDate(k),w:DB.daily[k].w,avg:+(sum/win.length).toFixed(1)};
  });
}
function last7FromSel(){var out=[],base=selDateObj();for(var i=6;i>=0;i--){var d=new Date(base);d.setDate(d.getDate()-i);out.push(keyOf(d));}return out;}
function statLine(){
  var ws=weightSeries(),upto=ws.filter(function(p){return p.k<=SEL;});
  var avg7=upto.length?upto[upto.length-1].avg:null;
  var l7=last7FromSel();
  var ph=l7.filter(function(k){return DB.daily[k]&&DB.daily[k].protein===true;}).length;
  var steps=l7.map(function(k){return DB.daily[k]?DB.daily[k].steps:null;}).filter(function(v){return v!=null;});
  var stepAvg=steps.length?Math.round(steps.reduce(function(a,b){return a+b;},0)/steps.length):null;
  var sl=l7.map(function(k){return DB.daily[k]?DB.daily[k].sleep:null;}).filter(function(v){return v!=null;});
  var slAvg=sl.length?(sl.reduce(function(a,b){return a+b;},0)/sl.length).toFixed(1):null;
  return [
    {l:"7-day avg",v:avg7!=null?avg7:"\u2014",u:"lb"},
    {l:"protein 7d",v:ph+"/7",u:""},
    {l:"steps avg",v:stepAvg!=null?(stepAvg/1000).toFixed(1)+"k":"\u2014",u:""},
    {l:"sleep avg",v:slAvg!=null?slAvg:"\u2014",u:"h"}
  ];
}
function renderStats(){
  document.getElementById("stats").innerHTML=statLine().map(function(s){
    return '<div class="stat"><div class="v cond">'+s.v+(s.u?' <small>'+s.u+'</small>':'')+'</div><div class="l">'+s.l+'</div></div>';
  }).join("");
}

function lineChart(seriesList,labels,height){
  var W=340,H=height||180,padL=34,padR=8,padT=10,padB=22,all=[];
  seriesList.forEach(function(s){s.data.forEach(function(v){if(v!=null)all.push(v);});});
  if(all.length<2)return null;
  var min=Math.min.apply(null,all),max=Math.max.apply(null,all);if(max-min<2){max+=1;min-=1;}
  var n=labels.length;
  function X(i){return padL+(n<=1?0:(W-padL-padR)*i/(n-1));}
  function Y(v){return padT+(H-padT-padB)*(1-(v-min)/(max-min));}
  var g='<svg viewBox="0 0 '+W+' '+H+'" width="100%" height="'+H+'">';
  for(var gi=0;gi<=3;gi++){var gv=min+(max-min)*gi/3,gy=Y(gv);
    g+='<line x1="'+padL+'" y1="'+gy+'" x2="'+(W-padR)+'" y2="'+gy+'" stroke="#2E3743" stroke-dasharray="3 3"/>';
    g+='<text x="'+(padL-4)+'" y="'+(gy+3)+'" fill="#8A96A3" font-size="9" text-anchor="end">'+(+gv.toFixed(1))+'</text>';}
  var stepLbl=Math.max(1,Math.ceil(n/6));
  for(var li=0;li<n;li+=stepLbl){g+='<text x="'+X(li)+'" y="'+(H-6)+'" fill="#8A96A3" font-size="9" text-anchor="middle">'+esc(labels[li])+'</text>';}
  seriesList.forEach(function(s){
    var d="",started=false;
    s.data.forEach(function(v,i){if(v==null)return;d+=(started?"L":"M")+X(i).toFixed(1)+" "+Y(v).toFixed(1)+" ";started=true;});
    g+='<path d="'+d+'" fill="none" stroke="'+s.color+'" stroke-width="'+(s.width||2)+'" stroke-linejoin="round"/>';
    if(s.dots)s.data.forEach(function(v,i){if(v==null)return;g+='<circle cx="'+X(i).toFixed(1)+'" cy="'+Y(v).toFixed(1)+'" r="2.5" fill="'+s.color+'"/>';});
  });
  return g+"</svg>";
}

var TAB="today",LIFTDAY="A",EXPICK="rdl";
function setTab(t){TAB=t;render();}
function render(){
  document.getElementById("dlabeltext").textContent=longLabel(SEL);
  document.getElementById("dtag").textContent=(SEL===todayKey()?"TODAY":"");
  document.getElementById("datepick").value=SEL;
  ["today","lift","progress","history","data"].forEach(function(t){document.getElementById("nav-"+t).classList.toggle("sel",TAB===t);});
  renderStats();
  var m=document.getElementById("main");
  if(TAB==="today")m.innerHTML=viewToday();
  else if(TAB==="lift")m.innerHTML=viewLift();
  else if(TAB==="progress")m.innerHTML=viewProgress();
  else if(TAB==="history")m.innerHTML=viewHistory();
  else m.innerHTML=viewData();
}

function setDaily(field,val){var k=SEL;if(!DB.daily[k])DB.daily[k]={};DB.daily[k][field]=val;saveDB();render();}
function setDailyNum(field,el){var k=SEL;if(!DB.daily[k])DB.daily[k]={};DB.daily[k][field]=numOrNull(el.value);saveDB();renderStats();}
function setWaist(el){var k=SEL,v=numOrNull(el.value);if(v==null)delete DB.waist[k];else DB.waist[k]=v;saveDB();}
function viewToday(){
  var k=SEL,d=DB.daily[k]||{},isSun=selDateObj().getDay()===0,kneeBtns="";
  for(var i=0;i<=10;i++){var cls=d.knee===i?(i<=3?"sel-low":i<=6?"sel-mid":"sel-high"):"";
    kneeBtns+='<button class="'+cls+'" onclick="setDaily(\'knee\','+i+')">'+i+'</button>';}
  function tog(field,val,yes,no){
    return '<div class="toggle"><button class="'+(val===true?"on-yes":"")+'" onclick="setDaily(\''+field+'\',true)">'+yes+'</button>'
      +'<button class="'+(val===false?"on-no":"")+'" onclick="setDaily(\''+field+'\',false)">'+no+'</button></div>';}
  return ''
  +'<div class="card"><label class="fl">Morning weight (lb)</label><input type="number" inputmode="decimal" step="0.1" placeholder="e.g. 161.4" value="'+(d.w!=null?d.w:"")+'" onchange="setDailyNum(\'w\',this)"></div>'
  +'<div class="card"><label class="fl">Protein \u2265 '+PROTEIN_TARGET+'g?</label>'+tog("protein",d.protein,"Hit it","Missed")+'</div>'
  +'<div class="card"><label class="fl">Pickleball?</label>'+tog("pb",d.pb,"Played","No")+'</div>'
  +'<div class="card"><label class="fl">Knee pain (0 none \u2013 10 worst)</label><div class="knee">'+kneeBtns+'</div></div>'
  +'<div class="row"><div class="card"><label class="fl">Steps</label><input type="number" inputmode="numeric" step="100" placeholder="8000" value="'+(d.steps!=null?d.steps:"")+'" onchange="setDailyNum(\'steps\',this)"></div>'
  +'<div class="card"><label class="fl">Sleep (hrs)</label><input type="number" inputmode="decimal" step="0.25" placeholder="6.5" value="'+(d.sleep!=null?d.sleep:"")+'" onchange="setDailyNum(\'sleep\',this)"></div></div>'
  +'<div class="card '+(isSun?"waistflag":"")+'"><label class="fl">Waist at navel (in) \u2014 weekly'+(isSun?' \u00b7 measure day':'')+'</label><input type="number" inputmode="decimal" step="0.1" placeholder="e.g. 35.5" value="'+(DB.waist[k]!=null?DB.waist[k]:"")+'" onchange="setWaist(this)"></div>';
}

function setLiftDay(dy){LIFTDAY=dy;var k=SEL;if(DB.lifts[k])DB.lifts[k].day=dy;saveDB();render();}
function setEx(exId,field,el){
  var k=SEL;if(!DB.lifts[k])DB.lifts[k]={day:LIFTDAY,ex:{}};DB.lifts[k].day=LIFTDAY;
  if(!DB.lifts[k].ex[exId])DB.lifts[k].ex[exId]={};
  DB.lifts[k].ex[exId][field]=numOrNull(el.value);saveDB();
}
function prevEntry(exId){
  var keys=Object.keys(DB.lifts).filter(function(k){return k<SEL&&DB.lifts[k].ex&&DB.lifts[k].ex[exId];}).sort();
  return keys.length?{k:keys[keys.length-1],e:DB.lifts[keys[keys.length-1]].ex[exId]}:null;
}
function fmtPrev(p,m){
  if(!p)return null;var e=p.e,pre="last ("+shortDate(p.k)+"): ";
  if(m==="wr")return(e.w!=null&&e.r!=null)?pre+e.w+" \u00d7 "+e.r:null;
  if(m==="reps")return e.r!=null?pre+e.r+" reps":null;
  if(m==="secs")return e.s!=null?pre+e.s+"s":null;
  if(m==="wsecs")return(e.w!=null&&e.s!=null)?pre+e.w+" lb \u00d7 "+e.s+"s":null;
  return null;
}
function viewLift(){
  var k=SEL,sess=DB.lifts[k]||{ex:{}};
  if(DB.lifts[k]&&DB.lifts[k].day)LIFTDAY=DB.lifts[k].day;
  var groups=allExercises();
  var h='<div class="daypick">';
  ["A","B","C","Custom"].forEach(function(dy){h+='<button class="cond '+(LIFTDAY===dy?"sel":"")+'" onclick="setLiftDay(\''+dy+'\')">'+(dy==="Custom"?"CUSTOM":"DAY "+dy)+'</button>';});
  h+='</div><div class="hint">Log your top working set. Editing '+(k===todayKey()?"today":longLabel(k))+'. Hit the top of the range \u2192 add weight next time.</div>';
  var list=groups[LIFTDAY];
  if(!list.length)h+='<div class="empty">No exercises here yet. Add one below.</div>';
  list.forEach(function(ex){
    var v=(sess.ex&&sess.ex[ex.id])||{},prev=fmtPrev(prevEntry(ex.id),ex.m),isCustom=DB.custom.some(function(c){return c.id===ex.id;});
    h+='<div class="card"><div class="exhead"><span class="exname">'+esc(ex.name)+'</span><span class="extgt">'+esc(ex.target||MLABEL[ex.m])+'</span></div><div class="row">';
    if(ex.m==="wr"||ex.m==="wsecs")h+='<div><label class="fl">Weight (lb)</label><input type="number" inputmode="decimal" step="2.5" placeholder="\u2014" value="'+(v.w!=null?v.w:"")+'" onchange="setEx(\''+ex.id+'\',\'w\',this)"></div>';
    if(ex.m==="wr"||ex.m==="reps")h+='<div><label class="fl">Reps</label><input type="number" inputmode="numeric" step="1" placeholder="\u2014" value="'+(v.r!=null?v.r:"")+'" onchange="setEx(\''+ex.id+'\',\'r\',this)"></div>';
    if(ex.m==="secs"||ex.m==="wsecs")h+='<div><label class="fl">Seconds</label><input type="number" inputmode="numeric" step="5" placeholder="\u2014" value="'+(v.s!=null?v.s:"")+'" onchange="setEx(\''+ex.id+'\',\'s\',this)"></div>';
    h+='</div><div class="prev '+(prev?"":"none")+'">'+(prev?esc(prev):"first time")+'</div>';
    if(isCustom)h+='<button class="delx" onclick="deleteCustom(\''+ex.id+'\')">remove this exercise</button>';
    h+='</div>';
  });
  h+='<button class="btn primary" onclick="openAddModal()">+ Add exercise</button>';
  return h;
}

var NEWEX={name:"",m:"wr",day:"A"};
function openAddModal(){NEWEX={name:"",m:"wr",day:(LIFTDAY||"A")};renderModal();}
function closeModal(){document.getElementById("modalhost").innerHTML="";}
function setNew(f,v){NEWEX[f]=v;renderModal();}
function setNewName(el){NEWEX.name=el.value;}
function renderModal(){
  function seg(field,opts){return '<div class="seg">'+opts.map(function(o){
    return '<button class="'+(NEWEX[field]===o[0]?"sel":"")+'" onclick="setNew(\''+field+'\',\''+o[0]+'\')">'+o[1]+'</button>';}).join("")+'</div>';}
  var html='<div class="modal"><div class="box">'
    +'<label class="fl">Exercise name</label>'
    +'<input type="text" id="newexname" placeholder="e.g. Kettlebell Around-the-World" value="'+esc(NEWEX.name)+'" oninput="setNewName(this)">'
    +'<div style="height:12px"></div><label class="fl">What does it measure?</label>'
    +seg("m",[["wr","Weight \u00d7 Reps"],["reps","Reps"],["secs","Seconds"],["wsecs","Wt \u00d7 Secs"]])
    +'<div style="height:12px"></div><label class="fl">Put it in</label>'
    +seg("day",[["A","Day A"],["B","Day B"],["C","Day C"],["Custom","Custom"]])
    +'<div style="height:16px"></div>'
    +'<button class="btn primary" onclick="saveNewEx()">Add exercise</button>'
    +'<button class="btn" onclick="closeModal()">Cancel</button></div></div>';
  document.getElementById("modalhost").innerHTML=html;
}
function saveNewEx(){
  var nm=(NEWEX.name||"").trim();if(!nm){alert("Give the exercise a name.");return;}
  var id="cx_"+Date.now().toString(36);
  DB.custom.push({id:id,name:nm,m:NEWEX.m,day:NEWEX.day,target:MLABEL[NEWEX.m]});
  LIFTDAY=NEWEX.day;saveDB();closeModal();render();
}
function deleteCustom(id){
  if(!confirm("Remove this exercise? Past logged data stays in your history."))return;
  DB.custom=DB.custom.filter(function(e){return e.id!==id;});saveDB();render();
}

function setExPick(el){EXPICK=el.value;render();}
function viewProgress(){
  var ws=weightSeries();
  var h='<div class="card"><label class="fl">Weight & 7-day average</label>';
  h+= ws.length<2 ? '<div class="empty">Log weight a few days and the trend appears. Judge the teal line, not the dots.</div>'
    : (lineChart([{data:ws.map(function(p){return p.w;}),color:"#8A96A3",width:1,dots:true},{data:ws.map(function(p){return p.avg;}),color:"#35C4B5",width:2.5}],ws.map(function(p){return p.date;}),200)||"");
  h+='</div>';
  var groups=allExercises(),flat=[];
  ["A","B","C","Custom"].forEach(function(dy){groups[dy].forEach(function(e){flat.push({dy:dy,e:e});});});
  if(!flat.some(function(x){return x.e.id===EXPICK;}))EXPICK=flat.length?flat[0].e.id:"rdl";
  var meta=exMeta(EXPICK)||{m:"wr",name:""};
  var hist=Object.keys(DB.lifts).sort().map(function(k){
    var s=DB.lifts[k];if(!s.ex||!s.ex[EXPICK])return null;var e=s.ex[EXPICK];
    var y=meta.m==="secs"?e.s:meta.m==="reps"?e.r:e.w;return y!=null?{date:shortDate(k),y:y}:null;}).filter(Boolean);
  var yl=meta.m==="secs"?"seconds":meta.m==="reps"?"reps":"weight";
  h+='<div class="card"><label class="fl">Lift progression ('+yl+')</label><select onchange="setExPick(this)">';
  flat.forEach(function(x){h+='<option value="'+x.e.id+'" '+(x.e.id===EXPICK?"selected":"")+'>'+(x.dy==="Custom"?"Custom":"Day "+x.dy)+' \u2014 '+esc(x.e.name)+'</option>';});
  h+='</select><div style="height:10px"></div>';
  h+= hist.length<2 ? '<div class="empty">Log this lift twice and the line appears. Up and to the right = winning.</div>'
    : (lineChart([{data:hist.map(function(p){return p.y;}),color:"#E8A33D",width:2.5,dots:true}],hist.map(function(p){return p.date;}),170)||"");
  h+='</div>';
  var wk=Object.keys(DB.waist).sort();
  h+='<div class="card"><label class="fl">Waist (in) \u2014 the real recomp scoreboard</label>';
  if(!wk.length)h+='<div class="empty">Measure at the navel weekly (Sundays flagged on the Daily tab).</div>';
  else wk.slice(-8).forEach(function(k,i,arr){var v=DB.waist[k],prev=i>0?DB.waist[arr[i-1]]:null,delta=prev!=null?+(v-prev).toFixed(1):null;
    h+='<div class="waistrow" onclick="openDay(\''+k+'\')"><span class="d">'+shortDate(k)+'</span><span class="cond" style="font-weight:700">'+v+'\"'
      +(delta!=null?' <span class="'+(delta<0?"delta-dn":delta>0?"delta-up":"d")+'">'+(delta>0?"+"+delta:delta)+'</span>':'')+'</span></div>';});
  h+='</div>';
  return h;
}

function openDay(k){SEL=k;setTab("today");}
function viewHistory(){
  var uniq={};
  Object.keys(DB.daily).forEach(function(k){uniq[k]=1;});
  Object.keys(DB.lifts).forEach(function(k){uniq[k]=1;});
  Object.keys(DB.waist).forEach(function(k){uniq[k]=1;});
  var keys=Object.keys(uniq).sort().reverse();
  if(!keys.length)return '<div class="card"><div class="empty">Nothing logged yet. Days appear here newest-first \u2014 tap any to view or edit.</div></div>';
  var h='<div class="card"><label class="fl">All logged days \u2014 tap to open & edit</label>';
  keys.forEach(function(k){
    var d=DB.daily[k]||{},bits=[];
    if(d.w!=null)bits.push(d.w+" lb");
    if(d.protein===true)bits.push("P\u2713");else if(d.protein===false)bits.push("P\u2717");
    if(DB.lifts[k]&&DB.lifts[k].ex&&Object.keys(DB.lifts[k].ex).length)bits.push("Lift "+(DB.lifts[k].day||""));
    if(d.pb===true)bits.push("\ud83c\udfd3");
    if(d.knee!=null)bits.push("knee "+d.knee);
    if(DB.waist[k]!=null)bits.push(DB.waist[k]+'\"');
    h+='<div class="histrow" onclick="openDay(\''+k+'\')"><span class="d">'+longLabel(k)+(k===todayKey()?' <span class="histbadge">today</span>':'')+'</span><span class="cond" style="font-weight:700;font-size:13px;color:var(--dim)">'+esc(bits.join(" \u00b7 ")||"\u2014")+'</span></div>';
  });
  h+='</div>';
  return h;
}

function exportData(){
  var json=JSON.stringify(DB,null,2),fname="recomp-backup-"+todayKey()+".json";
  try{if(navigator.share&&navigator.canShare){var f=new File([json],fname,{type:"application/json"});
    if(navigator.canShare({files:[f]})){navigator.share({files:[f],title:"Recomp backup"}).catch(function(){});return;}}}catch(e){}
  try{var blob=new Blob([json],{type:"application/json"}),a=document.createElement("a");
    a.href=URL.createObjectURL(blob);a.download=fname;document.body.appendChild(a);a.click();
    setTimeout(function(){URL.revokeObjectURL(a.href);a.remove();},500);return;}catch(e){}
  showBackupText(json);
}
function showBackupText(json){
  document.getElementById("main").innerHTML='<div class="card"><label class="fl">Backup \u2014 copy & save anywhere (Notes / email to yourself)</label>'
    +'<textarea id="bktext" style="width:100%;height:260px;background:var(--card2);color:var(--text);border:1px solid var(--line);border-radius:10px;padding:10px;font-size:11px"></textarea>'
    +'<button class="btn primary" onclick="copyBackup()">Copy to clipboard</button><button class="btn" onclick="render()">Back</button></div>';
  document.getElementById("bktext").value=json;
}
function copyBackup(){var t=document.getElementById("bktext");t.select();t.setSelectionRange(0,999999);
  try{navigator.clipboard.writeText(t.value);}catch(e){document.execCommand("copy");}alert("Copied.");}
function importData(){document.getElementById("importfile").click();}
document.getElementById("importfile").addEventListener("change",function(ev){
  var file=ev.target.files[0];if(!file)return;var reader=new FileReader();
  reader.onload=function(){try{var p=JSON.parse(reader.result);
    if(!p.daily&&!p.lifts&&!p.waist)throw new Error("bad");
    DB.daily=Object.assign({},DB.daily,p.daily||{});DB.lifts=Object.assign({},DB.lifts,p.lifts||{});
    DB.waist=Object.assign({},DB.waist,p.waist||{});
    if(p.custom)DB.custom=p.custom;if(p.hidden)DB.hidden=p.hidden;
    saveDB();render();alert("Import complete. "+Object.keys(DB.daily).length+" daily entries total.");
  }catch(e){alert("Couldn't read that file \u2014 use a backup exported from this app.");}};
  reader.readAsText(file);ev.target.value="";});
function viewData(){
  var days=Object.keys(DB.daily).length,sessions=Object.keys(DB.lifts).length;
  return ''
  +'<div class="card"><label class="fl">Your data</label>'
  +'<div style="font-size:15px;margin-bottom:4px">'+days+' daily \u00b7 '+sessions+' lift sessions \u00b7 '+Object.keys(DB.waist).length+' waist \u00b7 '+DB.custom.length+' custom exercises</div>'
  +'<div class="empty">Stored on this device in this browser. Export a backup after big weeks \u2014 a small file you can keep anywhere and re-import later or on a new phone.</div>'
  +'<button class="btn primary" onclick="exportData()">Export backup</button>'
  +'<button class="btn" onclick="importData()">Import backup</button></div>'
  +'<div class="card"><label class="fl">Install as an app</label>'
  +'<div class="empty">iPhone: open the hosted link in Safari \u2192 Share \u2192 Add to Home Screen.<br>Android: Chrome \u2192 \u22ee \u2192 Add to Home screen. Launches full-screen, works offline.</div></div>'
  +'<div class="card"><label class="fl">The rules</label>'
  +'<div class="empty" style="line-height:1.8">\u2022 2,100 kcal \u00b7 160g protein \u00b7 never cut protein to save calories<br>\u2022 Lift 3\u00d7/wk, RPE 7\u20138 \u00b7 top of range on all sets \u2192 add weight<br>\u2022 8,000 steps \u00b7 creatine 5g daily \u00b7 push sleep toward 7h<br>\u2022 Judge the 7-day average and waist tape, not one day\u2019s scale<br>\u2022 Adjust every 2\u20133 wks: avg flat \u2192 \u2212150 kcal carbs/fat; strength stalling \u2192 eat a bit more</div></div>';
}

loadDB();render();
</script>
</body>
</html>
